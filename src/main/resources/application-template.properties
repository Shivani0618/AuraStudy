# Server Port
server.port=8081

# Database Connection (Configure with your local PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/virtualclassroom_db
spring.datasource.username=YOUR_USERNAME
spring.datasource.password=YOUR_PASSWORD

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Security
spring.main.allow-bean-definition-overriding=true

# AI Gemini API (Obtain your key from Google AI Studio)
gemini.api.key=YOUR_GEMINI_API_KEY
gemini.api.url=https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent
